<svg width="160" height="120" viewBox="0 0 160 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111927"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3552"/>
      <stop offset="100%" stop-color="#111e33"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Device bezel -->
  <rect x="8" y="8" width="144" height="96" rx="12" ry="12" fill="url(#frame)" stroke="#243347" stroke-width="1.5"/>

  <!-- Screen -->
  <rect x="14" y="14" width="132" height="84" rx="7" ry="7" fill="url(#bg)"/>

  <!-- Clock — main feature, cyan accent -->
  <text x="80" y="52" font-family="'Courier New', monospace" font-size="28" font-weight="700"
        fill="#38bdf8" text-anchor="middle" letter-spacing="3" filter="url(#glow)">12:00</text>

  <!-- Date + week -->
  <text x="80" y="65" font-family="system-ui, sans-serif" font-size="8" fill="#4a6580" text-anchor="middle" letter-spacing="0.5">MON 29 JUN  ·  WEEK 26</text>

  <!-- Four widget tiles -->
  <rect x="17" y="74" width="28" height="18" rx="4" fill="#0d1e33" stroke="#1e3552" stroke-width="0.8"/>
  <rect x="50" y="74" width="28" height="18" rx="4" fill="#0d1e33" stroke="#1e3552" stroke-width="0.8"/>
  <rect x="83" y="74" width="28" height="18" rx="4" fill="#0d1e33" stroke="#1e3552" stroke-width="0.8"/>
  <rect x="116" y="74" width="28" height="18" rx="4" fill="#0d1e33" stroke="#1e3552" stroke-width="0.8"/>

  <!-- Widget labels -->
  <text x="31" y="81" font-family="system-ui" font-size="5.5" fill="#64748b" text-anchor="middle">RAIN</text>
  <text x="31" y="88" font-family="system-ui" font-size="6.5" fill="#94a3b8" text-anchor="middle">1.2mm</text>
  <text x="64" y="81" font-family="system-ui" font-size="5.5" fill="#64748b" text-anchor="middle">TEMP</text>
  <text x="64" y="88" font-family="system-ui" font-size="6.5" fill="#94a3b8" text-anchor="middle">18°C</text>
  <text x="97" y="81" font-family="system-ui" font-size="5.5" fill="#64748b" text-anchor="middle">TIMER</text>
  <text x="97" y="88" font-family="system-ui" font-size="6.5" fill="#38bdf8" text-anchor="middle">25:00</text>
  <text x="130" y="81" font-family="system-ui" font-size="5.5" fill="#64748b" text-anchor="middle">WEEK</text>
  <text x="130" y="88" font-family="system-ui" font-size="6.5" fill="#94a3b8" text-anchor="middle">W26</text>

  <!-- Sunrise/sunset indicator — subtle accent bar -->
  <line x1="17" y1="70" x2="143" y2="70" stroke="#1e3552" stroke-width="0.5"/>
  <line x1="17" y1="12" x2="143" y2="12" stroke="#243347" stroke-width="0.3" opacity="0.5"/>

  <!-- Small ambient sunrise icon on right of date row -->
  <circle cx="147" cy="34" r="3" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <line x1="147" y1="29" x2="147" y2="27" stroke="#f59e0b" stroke-width="0.8" opacity="0.5"/>
  <line x1="151" y1="30" x2="153" y2="28" stroke="#f59e0b" stroke-width="0.8" opacity="0.5"/>
  <line x1="152" y1="34" x2="154" y2="34" stroke="#f59e0b" stroke-width="0.8" opacity="0.5"/>
</svg>
